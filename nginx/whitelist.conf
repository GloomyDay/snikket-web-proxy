# Snikket IP whitelist
#
# This file is included in restricted location blocks.
# By default, no restrictions are applied.
#
# To restrict access, uncomment and edit the lines below:
#
# allow 192.168.0.0/16;
# allow 10.0.0.0/8;
# allow 203.0.113.50;
# deny all;
#
# Mount your own version into the container:
#   docker run -v /path/to/whitelist.conf:/etc/nginx/snippets/whitelist.conf:ro ...
#
# Or in docker-compose.yml:
#   volumes:
#     - ./whitelist.conf:/etc/nginx/snippets/whitelist.conf:ro
